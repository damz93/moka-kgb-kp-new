<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOKA KGB KP - Sistem Pengajuan Online</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/png" href="https://picsum.photos/32/32" />
    <link rel="apple-touch-icon" href="https://picsum.photos/192/192" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-blue-100 min-h-screen font-['Plus_Jakarta_Sans'] text-slate-800">
    <div id="app">
      <!-- Navigation Desktop -->
      <nav id="nav-desktop" class="hidden md:flex fixed top-0 w-full z-50 glass-nav px-8 py-4 justify-between items-center">
        <div class="flex items-center gap-2">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-blue-200">M</div>
          <span class="font-bold text-xl tracking-tight text-blue-900">MOKA <span class="text-blue-600">KGB KP</span></span>
        </div>
        <div class="flex gap-8 items-center">
          <button data-page="home" class="nav-link active">Beranda</button>
          <button data-page="cek" class="nav-link">Cek Pengajuan</button>
          <!-- <button data-page="ajukan" class="nav-link">Ajukan</button> -->
          <button data-page="login" class="bg-blue-600 text-white px-6 py-2 rounded-full font-semibold hover:bg-blue-700 transition-all shadow-md shadow-blue-200">Login Admin</button>
        </div>
      </nav>

      <!-- Main Content Area -->
      <main id="main-content" class="pt-24 pb-32 md:pb-12 px-4 max-w-5xl mx-auto">
        <!-- Content will be injected here -->
      </main>

      <!-- Bottom Navigation Mobile -->
      <nav id="nav-mobile" class="md:hidden fixed bottom-6 left-4 right-4 z-50 glass-mobile-nav flex justify-around items-center py-3 px-2 rounded-3xl shadow-2xl">
        <button data-page="home" class="mobile-nav-item active">
          <i data-lucide="home"></i>
          <span>Beranda</span>
        </button>
        <button data-page="cek" class="mobile-nav-item">
          <i data-lucide="search"></i>
          <span>Cek</span>
        </button>
        <!-- <button data-page="ajukan" class="mobile-nav-item">
          <i data-lucide="file-plus"></i>
          <span>Ajukan</span>
        </button> -->
        <button data-page="login" class="mobile-nav-item">
          <i data-lucide="user"></i>
          <span>Login</span>
        </button>
      </nav>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>
  </body>
</html>
